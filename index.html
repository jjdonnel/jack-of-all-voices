<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack of All Voices</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="site-wrapper">
<nav class="navbar">
    <input type="checkbox" id="menuToggle" class="menuOpen">
    
    <label for="menuToggle" class="label">
        <span>&#9776;</span>
    </label>

    <ul class="menu">
        <li class="items"><a href="#" onclick="displayHome()">Home</a></li>
        
        <li class="items">
            <input type="checkbox" id="demoToggle" class="menuInput">
            <label for="demoToggle" class="label">Demos</label>
            <ul class="subMenu">
                <li class="items"><a href="#" onclick="displayCommercial()">Commercial</a></li>
                <li class="items"><a href="#" onclick="displayNarration()">Narration</a></li>
                <li class="items"><a href="#" onclick="displayInstructional()">Instructional</a></li>
            </ul>
        </li>
        
        <li class="items"><a href="#" onclick="displayAbout()">About</a></li>
        <li class="items"><a href="#" onclick="displayContact()">Contact</a></li>
    </ul>
</nav>

    <main id="main" class="container">
        <div class="logo-container fade-element show">
            <img src=".images/JackOfAllVoices-logo.jpg" alt="Logo" class="centered-logo">
        </div>
    </main>

<footer class="site-footer">
    <div class="footer-content">
        <div class="footer-section">
            <p>&copy; 2026 Jack of All Voices</p>
        </div>

        <div class="footer-section">
            <a href="https://rhodyweather.com" target="_blank" class="weather-widget">
                <span class="status-dot"></span>
                <span id="current-temp">--°F</span>
                <span id="weather-desc">Loading...</span>
            </a>
        </div>

        <div class="footer-section footer-links">
            <a href="mailto:your-email@example.com">Email</a>
            <a href="https://linkedin.com" target="_blank">LinkedIn</a>
        </div>
    </div>
</footer>
</div>
    
<script src="app.js"></script>
<script src="components/weather.js"></script> 

<script src="components/home.js"></script>
<script src="components/commercial.js"></script>
<script src="components/narration.js"></script>
<script src="components/instructional.js"></script>
<script src="components/about.js"></script>
<script src="components/contact.js"></script>
</body>

</html>

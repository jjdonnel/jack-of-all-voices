<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack of All Voices</title>
    <link rel="apple-touch-icon" href="images/logo-final.jpg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="site-wrapper">
<nav class="navbar">
    <input type="checkbox" id="menuToggle" class="menuOpen">
    
    <label for="menuToggle" class="label">
        <span>&#9776;</span>
    </label>

    <ul class="menu">
        <li class="items"><a href="#" onclick="displayHome()">Home</a></li>
        
        <li class="items">
            <input type="checkbox" id="demoToggle" class="menuInput">
            <label for="demoToggle" class="label">Demos</label>
            <ul class="subMenu">
                <li class="items"><a href="#" onclick="displayCommercial()">Commercial</a></li>
                <li class="items"><a href="#" onclick="displayNarration()">Narration</a></li>
                <li class="items"><a href="#" onclick="displayInstructional()">Instructional</a></li>
            </ul>
        </li>
        
        <li class="items"><a href="#" onclick="displayAbout()">About</a></li>
        <li class="items"><a href="#" onclick="displayContact()">Contact</a></li>
    </ul>
</nav>

<main id="main" class="container"></main>

<footer class="site-footer">
    <div class="footer-content">
        <div class="footer-section">
            <p>&copy; 2026 Jack of All Voices</p>
        </div>

        <div class="footer-section">
            <a href="https://rhodyweather.com" target="_blank" class="weather-widget">
                <span class="status-dot"></span>
                <span id="current-temp">--°F</span>
                <span id="weather-desc">Loading...</span>
                <img id="icon" src="" alt="Weather Icon">
            </a>
        </div>

        <div class="footer-section footer-links">
            <a href="mailto:your-email@example.com" aria-label="Email Jack" class="social-icon-link">
                <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </a>
            
            <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="Jack's LinkedIn" class="social-icon-link">
                <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                    <rect x="2" y="9" width="4" height="12"></rect>
                    <circle cx="4" cy="4" r="2"></circle>
                </svg>
            </a>
        </div>
    </div>
</footer>
</div>
    
<script src="app.js"></script>
<script src="components/weather.js"></script> 
<script src="components/home.js"></script>
<script src="components/commercial.js"></script>
<script src="components/narration.js"></script>
<script src="components/instructional.js"></script>
<script src="components/about.js"></script>
<script src="components/contact.js"></script>
</body>

</html>
